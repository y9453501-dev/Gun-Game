<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weapon Lab</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #111; touch-action: none; font-family: sans-serif; }
        
        /* UI Katmanı - Tıklanabilir olması için z-index 1000 yaptık */
        #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; }
        
        .top-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; pointer-events: auto; }
        .s-btn { padding: 8px 15px; background: rgba(0,0,0,0.6); border: 1px solid #fff; border-radius: 5px; color: #fff; cursor: pointer; font-size: 12px; }

        /* Envanter Butonları - Basılabilir yapıldı */
        .inv { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; pointer-events: auto; }
        .slot { width: 50px; height: 50px; background: #fff; border: 2px solid #333; border-radius: 10px; display: flex; justify-content: center; align-items: center; color: #000; font-weight: bold; font-size: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .slot:active { background: #ccc; transform: scale(0.9); }

        /* Kontroller */
        #joy { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; pointer-events: auto; }
        #fire { position: absolute; bottom: 50px; right: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        #fire::after { content: ''; width: 35px; height: 35px; background: #fff; border-radius: 50%; }
        
        #cross { position: fixed; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid lime; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 1100; }
    </style>
</head>
<body>

    <div id="cross"></div>
    <div id="ui">
        <div class="top-bar">
            <div style="display: flex; gap: 10px;">
                <div class="s-btn" onclick="setLang('tr')">TR</div>
                <div class="s-btn" onclick="setLang('en')">EN</div>
            </div>
            <div class="s-btn" onclick="goFS()">FULL SCREEN</div>
        </div>

        <div class="inv">
            <div class="slot" onclick="sG(1)">1</div>
            <div class="slot" onclick="sG(2)">2</div>
            <div class="slot" onclick="sG(3)">3</div>
            <div class="slot" onclick="sG(4)">4</div>
        </div>
        
        <div id="joy"></div>
        <div id="fire"></div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
        <a-assets>
            <a-asset-item id="s1" src="silah1.glb"></a-asset-item>
            <a-asset-item id="s2" src="silah2.glb"></a-asset-item>
            <a-asset-item id="s3" src="silah3.glb"></a-asset-item>
            <a-asset-item id="s4" src="silah4.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#222"></a-sky>
        
        <a-box position="0 5 -15" width="40" height="15" depth="1" material="color: #444; roughness: 0.8" class="target"></a-box>
        <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#333"></a-plane>
        <a-grid position="0 0.05 0" cell-size="2" section-size="10" color="#555"></a-grid>

        <a-entity id="rig" position="0 1.6 0">
            <a-entity id="cam" camera look-controls="reverseTouchDrag: true">
                <a-entity id="ray" raycaster="objects: .target; far: 50"></a-entity>
                
                <a-entity id="gun" 
                          gltf-model="#s1" 
                          position="0.25 -0.3 -0.6" 
                          rotation="0 180 0" 
                          scale="0.3 0.3 0.3"> </a-entity>
            </a-entity>
        </a-entity>

        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="2 4 -3" intensity="0.8"></a-light>
    </a-scene>

    <script>
        const gun = document.getElementById('gun');
        const scene = document.querySelector('a-scene');

        // Silah Seçme - TIKLANABİLİR
        window.sG = function(n) {
            gun.setAttribute('gltf-model', '#s' + n);
            console.log("Silah Değişti: " + n);
        };

        window.setLang = function(l) { alert("Dil: " + l); }
        window.goFS = function() { document.documentElement.requestFullscreen(); }

        // Ateş Etme
        document.getElementById('fire').ontouchstart = (e) => {
            e.preventDefault();
            gun.setAttribute('animation', "property: position; from: 0.25 -0.3 -0.6; to: 0.25 -0.3 -0.5; dur: 50; dir: alternate; loop: 2");
            const hits = document.getElementById('ray').components.raycaster.intersections;
            if (hits.length > 0) {
                const h = document.createElement('a-circle');
                h.setAttribute('position', hits[0].point);
                h.setAttribute('radius', '0.05');
                h.setAttribute('color', '#000');
                scene.appendChild(h);
            }
        };

        // Joystick
        let f = 0, s = 0;
        nipplejs.create({ zone: document.getElementById('joy'), mode: 'static', position: {left: '65px', bottom: '65px'}, color: '#fff' })
        .on('move', (e, d) => {
            f = -Math.sin(d.angle.radian) * d.force * 0.15;
            s = -Math.cos(d.angle.radian) * d.force * 0.15;
        }).on('end', () => { f = 0; s = 0; });

        function update() {
            if (f || s) {
                const r = document.getElementById('cam').getAttribute('rotation');
                const rad = r.y * (Math.PI / 180);
                const p = document.getElementById('rig').getAttribute('position');
                p.x += (f * Math.sin(rad) + s * Math.cos(rad));
                p.z += (f * Math.cos(rad) - s * Math.sin(rad));
                document.getElementById('rig').setAttribute('position', p);
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
                <div class="s-btn" onclick="setL('tr')">TR</div>
                <div class="s-btn" onclick="setL('en')">EN</div>
            </div>
            <div class="s-btn" onclick="goFS()">FULL</div>
        </div>

        <div class="inv">
            <div class="slot" onclick="sG(1)">1</div>
            <div class="slot" onclick="sG(2)">2</div>
            <div class="slot" onclick="sG(3)">3</div>
            <div class="slot" onclick="sG(4)">4</div>
        </div>
        
        <div id="joy"></div>
        <div id="fire"></div>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded style="height: 100vh; width: 100vw;">
        <a-assets>
            <a-asset-item id="s1" src="silah1.glb"></a-asset-item>
            <a-asset-item id="s2" src="silah2.glb"></a-asset-item>
            <a-asset-item id="s3" src="silah3.glb"></a-asset-item>
            <a-asset-item id="s4" src="silah4.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#fff"></a-sky>
        <a-box position="0 5 0" width="60" height="15" depth="60" side="back" material="color: #ffffff; shader: flat"></a-box>
        <a-grid position="0 0.02 0" cell-size="5" section-size="10" color="#f5f5f5"></a-grid>

        <a-entity id="rig" position="0 1.6 0">
            <a-entity id="cam" camera look-controls="reverseTouchDrag: true">
                <a-entity id="ray" raycaster="objects: a-box; far: 50"></a-entity>
                <a-entity id="gun" gltf-model="#s1" position="0.3 -0.35 -0.6" rotation="0 180 0" scale="1 1 1"></a-entity>
            </a-entity>
        </a-entity>

        <a-light type="ambient" intensity="1.5"></a-light>
    </a-scene>

    <script>
        const gun = document.getElementById('gun');
        const scene = document.querySelector('a-scene');

        function sG(n) { gun.setAttribute('gltf-model', '#s' + n); }
        function setL(l) { console.log(l); }
        function goFS() {
            let d = document.documentElement;
            if (d.requestFullscreen) d.requestFullscreen();
            else if (d.webkitRequestFullscreen) d.webkitRequestFullscreen();
        }

        document.getElementById('fire').ontouchstart = (e) => {
            e.preventDefault();
            gun.setAttribute('animation', "property: position; from: 0.3 -0.35 -0.6; to: 0.3 -0.35 -0.55; dur: 50; dir: alternate; loop: 2");
            const hits = document.getElementById('ray').components.raycaster.intersections;
            if (hits.length > 0) {
                const h = document.createElement('a-circle');
                h.setAttribute('position', hits[0].point);
                h.setAttribute('radius', '0.03');
                h.setAttribute('color', '#555');
                scene.appendChild(h);
            }
        };

        let f = 0, s = 0;
        nipplejs.create({ zone: document.getElementById('joy'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: '#eee' })
        .on('move', (e, d) => {
            f = -Math.sin(d.angle.radian) * d.force * 0.15;
            s = -Math.cos(d.angle.radian) * d.force * 0.15;
        }).on('end', () => { f = 0; s = 0; });

        function update() {
            if (f || s) {
                const r = document.getElementById('cam').getAttribute('rotation');
                const rad = r.y * (Math.PI / 180);
                const p = document.getElementById('rig').getAttribute('position');
                p.x += (f * Math.sin(rad) + s * Math.cos(rad));
                p.z += (f * Math.cos(rad) - s * Math.sin(rad));
                document.getElementById('rig').setAttribute('position', p);
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
